<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.8 Birthday | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; color: #334155; }
        .fade-in { animation: fadeIn 2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-8 text-center fade-in">
        <p class="text-xs tracking-widest text-slate-400 uppercase mb-2">March 8th</p>
        <h1 class="text-3xl font-light tracking-tight">时光博物馆</h1>
        <div class="w-10 h-px bg-slate-300 mx-auto mt-4"></div>
    </header>

    <main class="flex-grow px-6 max-w-2xl mx-auto w-full py-12">
        
        <div class="text-center mb-16">
            <p class="text-sm text-slate-500">这是我们共同庆祝生日的第 <span class="font-serif italic text-blue-600">10+</span> 年</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="space-y-4">
                <h3 class="font-medium border-l-2 border-blue-400 pl-3">TO: 优秀的学霸君</h3>
                <p class="text-sm leading-relaxed text-slate-600">
                    大三是忙碌的一年。愿你在算法、实验或论文的间隙，依然能准时看到落日，享受每一个热爱生活的瞬间。祝前程似锦。
                </p>
            </div>
            <div class="space-y-4 text-right md:text-left">
                <h3 class="font-medium border-r-2 md:border-r-0 md:border-l-2 border-green-400 pr-3 md:pl-3">TO: 21岁的自己</h3>
                <p class="text-sm leading-relaxed text-slate-600">
                    愿我也能像你一样坚定且纯粹。在这个我们共同的生日里，祝自己和老友，新一岁都有新的自由。
                </p>
            </div>
        </div>

        <div class="mt-24 text-center">
            <button onclick="showSecret()" class="text-xs text-slate-400 border border-slate-200 px-4 py-2 rounded-full hover:bg-white transition-all">
                点击解锁老友暗号
            </button>
            <p id="secret-msg" class="mt-4 text-sm text-blue-500 hidden italic">“小学操场见！” —— 祝你今天快乐，不只是生日。</p>
        </div>
    </main>

    <footer class="p-8 text-center text-[10px] text-slate-300 tracking-widest uppercase">
        Designed for a special friend | 2026
    </footer>

    <script>
        function showSecret() {
            document.getElementById('secret-msg').classList.toggle('hidden');
        }
    </script>
</body>
</html>
