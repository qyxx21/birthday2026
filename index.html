<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝我们生日快乐~</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-warm: #ffecd2;
            --secondary-warm: #fcb69f;
            --text-color: #5d4037;
            --accent-gold: #d4a373;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Mali', 'STKaiti', 'Microsoft YaHei', cursive;
            background: linear-gradient(120deg, var(--primary-warm) 0%, var(--secondary-warm) 100%);
            color: var(--text-color);
            overflow-x: hidden;
        }

        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .hint-text {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            color: var(--text-color);
            animation: bounceIn 1s ease, heartBeat 2s infinite 1s;
        }

        .open-btn {
            padding: 18px 45px;
            font-size: 1.3rem;
            background-color: white;
            border: 2px solid var(--accent-gold);
            border-radius: 50px;
            color: var(--accent-gold);
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .open-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background-color: var(--accent-gold);
            color: white;
        }

        #card-content {
            display: none;
            max-width: 650px;
            margin: 50px auto;
            padding: 50px 40px;
            background-image: url('1.jpg');
            background-size: cover;   
            background-position: center; 
            background-repeat: no-repeat;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
        }

        .wish-text {
            line-height: 2;
            font-size: 1.25rem;
            min-height: 220px;
            white-space: pre-wrap;
            position: relative;
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(2px); 
            border-radius: 15px;
            padding: 25px;
        }

        .typing::after {
            content: '|';
            animation: blink 0.7s infinite;
        }

        .signature {
            text-align: right;
            margin-top: 35px;
            font-size: 1.4rem;
            font-style: italic;
            font-weight: bold;
            color: var(--accent-gold);
            transform: rotate(-2deg);
        }

        /* 留言墙 */
        .message-wall {
            display: none;
            margin-top: 40px;
            border-top: 2px dashed rgba(93, 64, 55, 0.2);
            padding-top: 25px;
            animation: fadeInWall 1.5s forwards;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            padding: 20px;
        }

        .wall-title {
            font-size: 1.1rem;
            color: var(--text-color);
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            opacity: 0.7;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #message-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--accent-gold);
            border-radius: 20px;
            outline: none;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.8);
        }

        #send-btn {
            padding: 10px 20px;
            background: var(--accent-gold);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .message-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            font-size: 0.95rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: slideIn 0.4s ease;
        }

        /* 动画定义 */
        @keyframes fadeInWall { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes heartBeat { 0% { transform: scale(1); } 14% { transform: scale(1.1); } 28% { transform: scale(1); } 42% { transform: scale(1.1); } 70% { transform: scale(1); } }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 99; }
    </style>
</head>
<body>

    <div class="bubbles-container" id="bubbles-box"></div>

    <audio id="bgm" src="bgm.mp3" loop></audio>
    <canvas id="confetti-canvas"></canvas>

    <div id="welcome-screen">
        <div class="hint-text">你收到了来自神秘好友的贺卡！</div>
        <button class="open-btn" onclick="openCard()">点击开启贺卡 ✨</button>
    </div>

    <div id="card-content">
        <div class="wish-text typing" id="wish-typing"></div>
        <div class="signature">—— 裘忆潇</div>

        <div class="message-wall" id="message-wall">
            <div class="wall-title">· 留言墙 ·</div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="写点什么吧...">
                <button id="send-btn" onclick="addMessage()">发送</button>
            </div>
            <div id="messages-list"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function createBubbles() {
            const container = document.getElementById('bubbles-box');
            const bubbleCount = 15; 
            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const size = Math.random() * 60 + 20 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                
                bubble.style.animationDelay = Math.random() * 8 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 7 + 's';
                
                container.appendChild(bubble);
            }
        }
        createBubbles();

        const fullWishText = `To 五角星:
    哇！又是我们共同的“破壳日”啦！🎂
    这两天虽然忙得脚不沾地，但想到这个网页，还是觉得一定要坚持把它写完。毕竟，能遇到一个“同月同日生”，且从小学、初中到高中都同一个学校的人，这概率大概比中彩票还要低吧？OvO虽然我从来没写过代码，这个网页看起来也有点“简陋”orz（不要嫌弃！）但它承载了我最真实的祝福。
    这么多年来(14年了吧？)，我们一直互相鼓励，见证了彼此最青涩到逐渐独立成熟的样子。虽然现在我们在不同的领域探索，但这种“老战友”般的默契，始终是我底气的一部分。
    作为“同龄同日”战友，我想对你说：
        即使我们要一起奔三了（bushi），也请继续保持对生活的热爱和对未来的憧憬。祝愿你在医学的道路上披荆斩棘，成为一名超级厉害的医生！愿我们在各自热爱的领域里发光发热，顶峰相见！
        最后，祝我们生日快乐，永远清醒且独立，温柔且坚定！✨`;

        function openCard() {
            const audio = document.getElementById('bgm');
            audio.play().catch(e => console.log("需用户交互触发音频"));
            fireConfetti();

            const welcome = document.getElementById('welcome-screen');
            const card = document.getElementById('card-content');

            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                card.style.display = 'block';
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0) scale(1)';
                    startTyping();
                }, 100);
            }, 1000);
        }

        function startTyping() {
            const textElement = document.getElementById('wish-typing');
            let index = 0;
            const speed = 100;

            function type() {
                if (index < fullWishText.length) {
                    textElement.innerHTML += fullWishText.charAt(index);
                    index++;
                    setTimeout(type, speed);
                } else {
                    textElement.classList.remove('typing');
                    showWall();
                }
            }
            type();
        }

        function showWall() {
            document.getElementById('message-wall').style.display = 'block';
        }

        function addMessage() {
            const input = document.getElementById('message-input');
            const list = document.getElementById('messages-list');
            if (input.value.trim() !== "") {
                const msg = document.createElement('div');
                msg.className = 'message-item';
                msg.innerText = input.value;
                list.prepend(msg);
                input.value = "";
                confetti({ particleCount: 30, spread: 60, origin: { y: 0.85 }, colors: ['#fcb69f', '#d4a373'] });
            }
        }

        function fireConfetti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 40 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }, colors: ['#ffecd2', '#fcb69f', '#fff'] }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }, colors: ['#d4a373', '#fcb69f', '#fff'] }));
            }, 250);
        }
    </script>
</body>
</html>
