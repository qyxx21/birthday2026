<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.8 Birthday | Our 10+ Years</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&display=swap');
        body { font-family: 'Noto Serif SC', serif; background-color: #FFFBEF; color: #4A5568; overflow-x: hidden; }
        .fade-in { animation: fadeIn 2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 更大的拍立得卡片 */
        .photo-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: zoom-in;
            background: white;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .photo-card:hover { transform: scale(1.05) rotate(-1deg); }
        
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000;
            justify-content: center; align-items: center; cursor: zoom-out;
        }
        #lightbox.active { display: flex; }
        #lightbox-img { max-width: 95%; max-height: 85%; border: 10px solid white; border-radius: 10px; }

        /* 留言墙风格 */
        .message-item { background: rgba(255,255,255,0.6); border-left: 4px solid #F6AD55; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="fixed top-6 right-6 z-50 flex gap-2">
        <audio id="myAudio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
        <button onclick="toggleMusic()" id="musicBtn" class="bg-orange-100 text-orange-600 p-3 rounded-full shadow-sm border border-orange-200 text-sm">🎵 播放音乐</button>
    </div>

    <header class="pt-16 pb-8 text-center fade-in">
        <p class="text-xs tracking-[0.4em] text-orange-400 uppercase mb-3 font-bold">Memory Lane</p>
        <h1 class="text-4xl font-light text-gray-800">生日快乐 · 3.8</h1>
        <div class="w-16 h-[3px] bg-orange-300 mx-auto mt-6 rounded-full"></div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-20 fade-in" style="animation-delay: 0.3s;">
            <div class="photo-card" onclick="openLightbox('1.jpg')">
                <img src="1.jpg" class="w-full h-[400px] object-cover rounded-xl bg-gray-100">
                <p class="mt-4 text-sm text-gray-500 text-center font-medium">找到的小学生互动画面</p>
            </div>
            <div class="photo-card" onclick="openLightbox('2.jpg')">
                <img src="2.jpg" class="w-full h-[400px] object-cover rounded-xl bg-gray-100">
                <p class="mt-4 text-sm text-gray-500 text-center font-medium">热爱生活的瞬间</p>
            </div>
        </div>

        <article class="max-w-2xl mx-auto text-center mb-20 fade-in" style="animation-delay: 0.6s;">
            <p class="leading-loose text-lg text-gray-700 italic">
                “愿你在追求卓越的路上，<br>
                也别忘了留些时间给路边的黄昏。”
            </p>
            <button onclick="showWish()" class="mt-8 px-10 py-3 bg-orange-400 text-white rounded-full shadow-lg hover:bg-orange-500 transition-all">解锁悄悄话</button>
            <div id="wish-box" class="hidden mt-6 p-6 bg-white/50 rounded-2xl border-2 border-dashed border-orange-200 text-orange-700">
                3月8日，愿我们都拥有新一岁的自由与浪漫。
            </div>
        </article>

        <section class="max-w-xl mx-auto bg-white/30 p-8 rounded-3xl border border-orange-100 fade-in" style="animation-delay: 0.9s;">
            <h3 class="text-center mb-6 font-bold text-orange-600 tracking-widest uppercase">留言墙</h3>
            <div id="message-list" class="max-h-60 overflow-y-auto mb-6 px-2">
                </div>
            <div class="flex gap-2">
                <input type="text" id="msg-input" placeholder="写下你的愿望..." class="flex-grow p-3 rounded-xl border border-orange-100 outline-none focus:border-orange-400 text-sm">
                <button onclick="addMessage()" class="bg-orange-400 text-white px-6 py-2 rounded-xl text-sm">发送</button>
            </div>
        </section>
    </main>

    <footer class="py-12 text-center text-[10px] text-orange-300 tracking-widest">
        SINCE ELEMENTARY SCHOOL · DESIGNED BY YOUR FRIEND
    </footer>

    <div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""></div>

    <script>
        // 初始化彩色纸屑
        window.onload = function() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#F6AD55', '#F687B3', '#68D391', '#63B3ED']
            });
            loadMessages();
        };

        function toggleMusic() {
            const audio = document.getElementById('myAudio');
            const btn = document.getElementById('musicBtn');
            if (audio.paused) { audio.play(); btn.innerText = "⏸ 暂停音乐"; } 
            else { audio.pause(); btn.innerText = "🎵 播放音乐"; }
        }

        function showWish() {
            document.getElementById('wish-box').classList.toggle('hidden');
            // 再次喷洒小量纸屑庆祝
            confetti({ particleCount: 50, spread: 50, origin: { y: 0.8 } });
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        // 留言墙逻辑
        function addMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            const msgs = JSON.parse(localStorage.getItem('bday_msgs') || '[]');
            msgs.push({ text: input.value, time: new Date().toLocaleString() });
            localStorage.setItem('bday_msgs', JSON.stringify(msgs));
            input.value = '';
            renderMessages();
        }

        function loadMessages() { renderMessages(); }

        function renderMessages() {
            const list = document.getElementById('message-list');
            const msgs = JSON.parse(localStorage.getItem('bday_msgs') || '[]');
            if (msgs.length === 0) {
                list.innerHTML = '<p class="text-center text-xs text-gray-400">还没有留言，写下第一句吧...</p>';
                return;
            }
            list.innerHTML = msgs.map(m => `
                <div class="message-item">
                    <p>${m.text}</p>
                    <span class="text-[10px] text-gray-400">${m.time}</span>
                </div>
            `).join('');
            list.scrollTop = list.scrollHeight;
        }
    </script>
</body>
</html>
