<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.8 Birthday | Our 10+ Years</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&display=swap');
        body { 
            font-family: 'Noto Serif SC', serif; 
            background-color: #FFFBEF;
            color: #4A5568;
            overflow-x: hidden; 
        }
        .fade-in { animation: fadeIn 2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .photo-card { 
            transition: transform 0.3s ease; 
            cursor: zoom-in;
            background: white;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .photo-card:hover { transform: scale(1.02) rotate(1deg); }
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000;
            justify-content: center; align-items: center; cursor: zoom-out;
        }
        #lightbox.active { display: flex; opacity: 1; }
        #lightbox-img { max-width: 90%; max-height: 80%; border: 8px solid white; border-radius: 8px; }
    </style>
</head>
