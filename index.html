<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.8 Birthday | Our 10+ Years</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&display=swap');
        body { 
            font-family: 'Noto Serif SC', serif; 
            /* 修改为温暖的奶油橘背景 */
            background-color: #FFFBEF;
            /* 文字颜色调暖 */
            color: #4A5568;
            overflow-x: hidden; 
        }
        .fade-in { animation: fadeIn 2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 图片卡片样式：增加拍立得边框感 */
        .photo-card { 
            transition: transform 0.3s ease, shadow 0.3s ease; 
            cursor: zoom-in;
            background: white;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .photo-card:hover { 
            transform: scale(1.02) rotate(1deg); /* 增加一点俏皮的旋转 */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* 放大预览层 (Lightbox) 样式 */
        #lightbox {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* 稍微加深背景 */
