<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>3.8 Birthday Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="p-6 flex justify-between">
        <span class="font-bold tracking-widest text-blue-600">SINCE 201X</span>
        <div id="music-player" class="cursor-pointer">🎵 Click to Play</div>
    </nav>

    <main class="max-w-4xl mx-auto mt-20 text-center">
        <h1 class="text-5xl font-light mb-8">生日快乐，<span class="text-blue-500">老友</span>。</h1>
        
        <div class="grid grid-cols-2 gap-8 my-20">
            <div class="glass p-8 rounded-2xl shadow-sm border border-white">
                <p class="text-sm uppercase tracking-widest text-gray-400">Her Side</p>
                <h2 class="text-2xl mt-2">保持好奇</h2>
            </div>
            <div class="glass p-8 rounded-2xl shadow-sm border border-white">
                <p class="text-sm uppercase tracking-widest text-gray-400">His Side</p>
                <h2 class="text-2xl mt-2">继续闪耀</h2>
            </div>
        </div>

        <div id="interaction" class="mt-12">
            <p class="mb-4 text-gray-500">还记得小学门口那家书店的名字吗？</p>
            <input type="text" id="answer" class="border-b-2 border-gray-300 bg-transparent outline-none text-center">
            <button onclick="checkAnswer()" class="ml-4 px-4 py-1 bg-black text-white rounded-full text-sm">解锁祝福</button>
        </div>
    </main>

    <script>
        function checkAnswer() {
            const ans = document.getElementById('answer').value;
            if(ans === "你的答案") {
                alert("祝你大三这一年，不仅有完美的绩点，更有无数个自由的黄昏。生日快乐！");
            }
        }
    </script>
</body>
</html>
